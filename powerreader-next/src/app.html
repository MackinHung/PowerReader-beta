<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#C9A96E" />
    <meta name="description" content="PowerReader - 台灣新聞立場分析，透過公民算力與 AI 技術，跨媒體比對新聞報導角度與立場偏向" />

    <!-- Canonical -->
    <link rel="canonical" href="https://powerreader.pages.dev" />

    <!-- Open Graph -->
    <meta property="og:title" content="PowerReader - 台灣新聞立場分析" />
    <meta property="og:description" content="透過公民算力與 AI 技術，跨媒體比對新聞報導角度與立場偏向" />
    <meta property="og:image" content="https://powerreader.pages.dev/icons/icon-512x512.png" />
    <meta property="og:url" content="https://powerreader.pages.dev" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="zh_TW" />
    <meta property="og:site_name" content="PowerReader" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PowerReader - 台灣新聞立場分析" />
    <meta name="twitter:description" content="透過公民算力與 AI 技術，跨媒體比對新聞報導角度與立場偏向" />
    <meta name="twitter:image" content="https://powerreader.pages.dev/icons/icon-512x512.png" />

    <!-- JSON-LD: Organization + WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "name": "PowerReader",
          "url": "https://powerreader.pages.dev",
          "logo": "https://powerreader.pages.dev/icons/icon-512x512.png",
          "description": "透過公民算力與 AI 技術，跨媒體比對新聞報導角度與立場偏向"
        },
        {
          "@type": "WebSite",
          "name": "PowerReader",
          "url": "https://powerreader.pages.dev",
          "description": "台灣新聞立場分析平台",
          "inLanguage": "zh-TW",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://powerreader.pages.dev/?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>

    <!-- CSP: allow WebLLM CDN + HuggingFace -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://powerreader-api.watermelom5404.workers.dev https://cdn.jsdelivr.net https://huggingface.co https://*.huggingface.co https://*.hf.co https://*.cloudfront.net https://raw.githubusercontent.com; img-src 'self' data: blob:; worker-src 'self' blob:;" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon-192x192.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PowerReader" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- Hide icon text flash: block rendering of icon font names until font loads -->
    <style>
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined';
        overflow: hidden;
        width: 1em;
        height: 1em;
        display: inline-block;
      }
      /* Splash screen — hidden once SvelteKit mounts */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1A1A1A;
        transition: opacity 0.2s ease-out;
      }
      #splash.fade-out { opacity: 0; pointer-events: none; }
      #splash-brand {
        font-family: 'Noto Serif TC', serif;
        font-size: 28px;
        color: #C9A96E;
        letter-spacing: 2px;
      }
    </style>

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div id="splash"><span id="splash-brand">PowerReader</span></div>
    <div style="display: contents">%sveltekit.body%</div>
    <script>
      // Remove splash once SvelteKit hydrates (fonts + JS ready)
      if (document.fonts) {
        document.fonts.ready.then(() => {
          const s = document.getElementById('splash');
          if (s) { s.classList.add('fade-out'); setTimeout(() => s.remove(), 200); }
        });
      } else {
        // Fallback: remove after a short delay
        setTimeout(() => {
          const s = document.getElementById('splash');
          if (s) { s.classList.add('fade-out'); setTimeout(() => s.remove(), 200); }
        }, 300);
      }
    </script>
  </body>
</html>
