<!DOCTYPE html>
<html lang="zh-TW" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="PowerReader - 透過公民算力分析台灣新聞媒體立場與爭議程度">
  <meta name="theme-color" content="#1A73E8">
  <meta name="language" content="zh-TW">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self' 'wasm-unsafe-eval';
                 style-src 'self' 'unsafe-inline';
                 img-src 'self' data: blob:;
                 font-src 'self';
                 connect-src 'self' https://*.workers.dev http://localhost:11434;
                 worker-src 'self' blob:;
                 frame-src 'none';
                 object-src 'none';
                 base-uri 'self'">
  <title>PowerReader</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="preload" href="/fonts/NotoSansTC-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/NotoSansTC-Bold.woff2" as="font" type="font/woff2" crossorigin>

  <style>
    @font-face {
      font-family: 'Noto Sans TC';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('/fonts/NotoSansTC-Regular.woff2') format('woff2');
      unicode-range: U+4E00-9FFF, U+3400-4DBF, U+F900-FAFF;
    }
    @font-face {
      font-family: 'Noto Sans TC';
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: url('/fonts/NotoSansTC-Bold.woff2') format('woff2');
      unicode-range: U+4E00-9FFF, U+3400-4DBF, U+F900-FAFF;
    }
  </style>

  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/analyze.css">
  <link rel="stylesheet" href="/css/profile.css">
  <link rel="stylesheet" href="/css/settings.css">
  <link rel="stylesheet" href="/css/onboarding.css">
</head>
<body>
  <!-- WCAG skip link -->
  <a href="#content" class="skip-link" data-i18n="a11y.nav.skip_to_content"></a>

  <!-- Offline banner (hidden by default) -->
  <div id="offline-banner" class="offline-banner" role="alert" aria-live="assertive" hidden>
    <span data-i18n="pwa.offline.banner"></span>
  </div>

  <header>
    <h1 data-i18n="nav.title.home"></h1>
  </header>

  <nav aria-label="主要導航">
    <!-- Reserved for breadcrumb or top navigation -->
  </nav>

  <main id="content" role="main">
    <!-- App content rendered here by router -->
  </main>

  <footer>
    <!-- Bottom navigation bar -->
    <nav class="bottom-nav" aria-label="底部導航列">
      <a href="#/" class="bottom-nav__item" data-i18n="nav.button.home" aria-current="page"></a>
      <a href="#/compare" class="bottom-nav__item" data-i18n="nav.button.compare"></a>
      <a href="#/analyze" class="bottom-nav__item" data-i18n="nav.button.analyze"></a>
      <a href="#/profile" class="bottom-nav__item" data-i18n="nav.button.profile"></a>
    </nav>
  </footer>

  <!-- Service Worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((reg) => console.log('[SW] Registered:', reg.scope))
          .catch((err) => console.error('[SW] Registration failed:', err));
      });
    }
  </script>

  <!-- App entry point -->
  <script type="module" src="/js/app.js"></script>
</body>
</html>
