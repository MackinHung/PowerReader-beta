<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PowerReader</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      min-height: 200px;
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
      font-size: 14px;
      color: #1A1A1A;
      background: #FFFFFF;
    }

    .popup-header {
      background: #1A73E8;
      color: #FFFFFF;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
    }

    .popup-body {
      padding: 16px;
    }

    /* Loading state */
    .popup-loading {
      text-align: center;
      padding: 32px 16px;
      color: #666666;
    }

    /* Not supported state */
    .popup-unsupported {
      text-align: center;
      padding: 32px 16px;
      color: #999999;
    }

    /* Result card */
    .result-card {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .result-title {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Bias bar */
    .bias-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bias-label {
      font-size: 12px;
      font-weight: 700;
      min-width: 48px;
    }

    .bias-bar {
      flex: 1;
      height: 8px;
      border-radius: 4px;
      background: linear-gradient(to right,
        #1565C0 0%, #42A5F5 25%, #9E9E9E 50%, #EF5350 75%, #B71C1C 100%);
      position: relative;
    }

    .bias-indicator {
      position: absolute;
      top: -4px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #FFFFFF;
      border: 3px solid #1A73E8;
      transform: translateX(-50%);
    }

    .bias-score {
      font-size: 12px;
      font-weight: 700;
      min-width: 28px;
      text-align: right;
    }

    /* Controversy */
    .controversy-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .controversy-badge {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
      color: #FFFFFF;
    }

    .controversy-badge--low { background: #4CAF50; }
    .controversy-badge--moderate { background: #FF9800; }
    .controversy-badge--high { background: #F44336; }
    .controversy-badge--very_high { background: #B71C1C; }

    /* Actions */
    .popup-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .popup-btn {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      color: #FFFFFF;
      background: #1A73E8;
    }

    .popup-btn:hover {
      background: #1557B0;
    }

    .popup-btn--secondary {
      background: transparent;
      color: #1A73E8;
      border: 1px solid #1A73E8;
    }

    .popup-btn--secondary:hover {
      background: #E8F0FE;
    }
  </style>
</head>
<body>
  <div class="popup-header" id="popup-header"></div>
  <div class="popup-body" id="popup-content">
    <div class="popup-loading" id="loading-state"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
