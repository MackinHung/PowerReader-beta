# PowerReader - Cloudflare Workers Configuration
# Maintainer: T07 (Deployment & Monitoring Team)
# SSOT: shared/config.js

name = "powerreader-api"
main = "src/workers/index.js"
compatibility_date = "2026-03-01"
workers_dev = true

# ===== KV Namespaces (config/cache only — Decision #008) =====
[[kv_namespaces]]
binding = "KV"
id = "d0f86735f09844ea85ce52cf36817f1c"

# ===== D1 Database (structured data — Decision #008) =====
[[d1_databases]]
binding = "DB"
database_name = "powerreader-db"
database_id = "a686912e-9f86-4f63-b6bc-a26b72ec0567"
migrations_dir = "src/workers/migrations"

# ===== Vectorize Index (knowledge base vector search) =====
[[vectorize]]
binding = "KNOWLEDGE_INDEX"
index_name = "powerreader-knowledge"

# ===== R2 Buckets =====
[[r2_buckets]]
binding = "ARTICLES"
bucket_name = "powerreader-articles"

# ===== Workers AI (bge-m3 embedding — Decision #007) =====
[ai]
binding = "AI"

# ===== Cron Triggers (split to stay within 10ms CPU limit per invocation) =====
# :00 = clustering + blindspot + session cleanup (CPU-heavy O(n²))
# :30 = metrics aggregation + alert evaluation (CPU-light)
[triggers]
crons = ["0 * * * *", "30 * * * *"]

# ===== Limits =====
# cpu_ms removed — not supported on Free plan
